  <agent_config>
    <!-- Shared agent configuration here -->
    <localfile>
      <location>Application</location>
      <log_format>eventchannel</log_format>
      <!-- Exclui eventos cujo Provider/@Name seja 'Universal Print' -->
      <query>Event[System[not(Provider/@Name='Universal Print')]]</query>
    </localfile>
    <!--Exclui eventos originados da impressora Brother-->
    <localfile>
      <location>Application</location>
      <log_format>eventchannel</log_format>
      <query>Event[not(System/Provider/@Name='Brother BrLog')]</query>
    </localfile>
    <!-- Exclui eventos cujo Provider/@Name seja 'Universal Print' -->
    <localfile>
      <location>Application</location>
      <log_format>eventchannel</log_format>
      <query>Event[System[not(Provider/@Name='Universal Print')]]</query>
    </localfile>
  </agent_config>
